<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - TechDrives</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white flex flex-col min-h-screen">
  <!-- Navigation -->
  <nav class="bg-gray-800 p-4">
    <div class="container mx-auto flex justify-between items-center">
      <a href="/" class="text-2xl font-bold text-blue-400">TechDrives</a>
      <div class="space-x-4">
        <a href="index.html" class="hover:text-blue-400">Home</a>
        <a href="products.html" class="hover:text-blue-400">Products</a>
        <a href="support.html" class="hover:text-blue-400">Support</a>
        <a href="contact.html" class="hover:text-blue-400">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow container mx-auto py-12">
    <h1 class="text-4xl font-bold mb-8">Contact Us</h1>
    <div class="max-w-2xl mx-auto">
      <form class="space-y-6">
        <div>
          <label for="name" class="block text-sm font-medium">Name</label>
          <input type="text" id="name" class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white">
        </div>
        <div>
          <label for="email" class="block text-sm font-medium">Email</label>
          <input type="email" id="email" class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white">
        </div>
        <div>
          <label for="message" class="block text-sm font-medium">Message</label>
          <textarea id="message" rows="4" class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white"></textarea>
        </div>
        <div>
          <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg">
            Send Message
          </button>
        </div>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 py-8 mt-auto">
    <div class="container mx-auto text-center">
      <p>&copy; 2023 TechDrives. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
